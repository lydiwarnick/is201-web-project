<!-- Game Section -->
<div class="game-container">
  <h2>Score: <span id="score">0</span></h2>
  <canvas id="game" width="400" height="400"></canvas>

  <div class="controls">
    <button class="btn btn-success" onclick="startGame()">Play</button>
    <button class="btn btn-danger" onclick="resetGame()">Replay</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gridSize = 20;
const tileCount = 20;
const speed = 120;

let snake = [];
let direction = {x: 1, y: 0};
let nextDirection = {x: 1, y: 0};
let food = null;
let score = 0;
let lastTime = 0;
let accumulator = 0;
let running = false;

function startGame() {
  if (!running) {
    running = true;
    requestAnimationFrame(loop);
  }
}

function resetGame() {
  snake = [{x: 10, y: 10}, {x: 9, y: 10}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  food = spawnFood();
  score = 0;
  document.getElementById('score').textContent = score;
  running = false;
  draw();
}

function spawnFood() {
  return {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
}

function loop(timestamp) {
  if (!running) return;

  if (!lastTime) lastTime = timestamp;
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  while (accumulator >= speed) {
    update();
    accumulator -= speed;
  }

  draw();
  requestAnimationFrame(loop);
}

function update() {
  direction = nextDirection;

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  if (
    head.x < 0 || head.y < 0 || head.x >= tileCount || head.y >= tileCount ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ) {
    running = false;
    alert('Game Over! Score: ' + score);
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = score;
    food = spawnFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // food
  ctx.fillStyle = '#333';
  ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

  // snake
  ctx.fillStyle = '#ff69b4';
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 2, gridSize - 2);
  }
}

window.addEventListener('keydown', (e) => {
  const key = e.key;

  if (key === 'ArrowUp' && direction.y === 0) nextDirection = {x: 0, y: -1};
  if (key === 'ArrowDown' && direction.y === 0) nextDirection = {x: 0, y: 1};
  if (key === 'ArrowLeft' && direction.x === 0) nextDirection = {x: -1, y: 0};
  if (key === 'ArrowRight' && direction.x === 0) nextDirection = {x: 1, y: 0};
});

resetGame();
</script>
